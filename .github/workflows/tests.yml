name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest-linux:
    name: Linux Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install package
        run: uv sync --python ${{ matrix.python-version }} --all-extras --locked --link-mode=copy

      - name: Build package
        run: ./.venv/bin/python -m build

      - name: Smoke commands
        run: |
          ./.venv/bin/python -c "import meters_tool_core; import meters_tool_cli; import meters_tool_webui"
          ./.venv/bin/meters-tool --help
          ./.venv/bin/meters-tool-webui --help

      - name: Run tests
        run: ./.venv/bin/python -m pytest tests -q -p no:cacheprovider

  pytest-windows:
    name: Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install package
        run: uv sync --python ${{ matrix.python-version }} --all-extras --locked --link-mode=copy

      - name: Build package
        run: .\.venv\Scripts\python.exe -m build

      - name: Smoke commands
        run: |
          .\.venv\Scripts\python.exe -c "import meters_tool_core; import meters_tool_cli; import meters_tool_webui"
          .\.venv\Scripts\meters-tool.exe --help
          .\.venv\Scripts\meters-tool-webui.exe --help

      - name: Run tests
        run: .\.venv\Scripts\python.exe -m pytest tests -q -p no:cacheprovider
