name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - Core
      - Cli
      - Webui

permissions:
  contents: read

jobs:
  pytest-linux:
    name: Linux Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install package
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"

      - name: Run tests
        run: ./.venv/bin/python -m pytest tests -q -p no:cacheprovider

  pytest-windows:
    name: Windows Python ${{ matrix.python-version }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install package
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"

      - name: Run tests
        run: .\.venv\Scripts\python.exe -m pytest tests -q -p no:cacheprovider
