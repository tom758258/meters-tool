[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "keysight-logger"
version = "1.1.8"
description = "CLI-first trigger logger for Keysight 34461A"
requires-python = ">=3.10"
dependencies = [
    "pyvisa>=1.14.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[project.scripts]
keysight-logger = "keysight_logger.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
