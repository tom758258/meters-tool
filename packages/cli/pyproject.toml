[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "keysight-logger-cli"
version = "1.3.1"
description = "CLI adapter for Keysight 34461A acquisition using Keysight Logger Core"
requires-python = ">=3.10"
dependencies = [
    "keysight-logger-core>=1.2.0,<1.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[project.scripts]
keysight-logger = "keysight_logger_cli.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
