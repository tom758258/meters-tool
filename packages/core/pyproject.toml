[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "keysight-logger-core"
version = "1.2.0"
description = "Core runtime and public API for Keysight 34461A acquisition integrations"
requires-python = ">=3.10"
dependencies = [
    "pyvisa>=1.14.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
