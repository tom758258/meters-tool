[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "keysight-logger-webui"
version = "1.2.1"
description = "Web UI adapter for Keysight 34461A acquisition using Keysight Logger Core"
requires-python = ">=3.10"
dependencies = [
    "keysight-logger-core>=1.2.0,<1.3",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
keysight-logger-webui = "keysight_logger_webui.web_ui:main"
keysight-logger-webui-launcher = "keysight_logger_webui.launcher:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
keysight_logger_webui = ["static/*"]
