<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keysight Logger</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>Keysight Meters</h1>
          <p class="subtitle">Local acquisition console</p>
        </div>
        <div class="run-controls">
          <button id="start-run" type="button" class="primary">Start</button>
          <button id="trigger-run" type="button">Trigger</button>
          <button id="stop-run" type="button" class="danger">Stop</button>
          <button id="open-csv" type="button" class="open-csv" disabled>Open CSV</button>
        </div>
      </section>

      <section class="resource-row">
        <label>
          VISA resource
          <input id="resource" name="resource" form="run-form" placeholder="Waiting Scan" required />
        </label>
        <div class="live-resource-field">
          <label>
            Live resource
            <select id="resource-select">
              <option value="">Scan to load live resources</option>
            </select>
          </label>
          <button id="refresh-resources" type="button">Scan Device</button>
        </div>
      </section>

      <section class="status-strip" aria-live="polite">
        <div>
          <span>State</span>
          <strong id="status-state">Idle</strong>
        </div>
        <div>
          <span>Captured</span>
          <strong id="status-captured">0</strong>
        </div>
        <div>
          <span>Errors</span>
          <strong id="status-errors">0</strong>
        </div>
        <div class="is-hidden" aria-hidden="true">
          <span>CSV</span>
          <strong id="status-csv">Default</strong>
        </div>
      </section>

      <section class="grid">
        <div class="settings-column">
          <form id="run-form" class="panel collapsible-panel" data-panel="run-setup">
            <div class="panel-header">
              <div>
                <h2>Run Setup</h2>
                <p class="panel-summary" data-summary-for="run-setup">Software current-dc</p>
              </div>
              <button class="panel-toggle" type="button" aria-expanded="true">Hide</button>
            </div>
            <div class="panel-body">
              <label>
                <span class="label-title">CSV path <span class="optional-mark">(Optional)</span></span>
                <input name="csv" placeholder="Default: data/YYYY-MM-DD-HH-MM-SS.csv" />
              </label>
            <label>
              Measurement
              <select name="measurement" id="measurement"></select>
            </label>
            <label>
              Trigger mode
              <select name="trigger_mode" id="trigger-mode"></select>
            </label>
            <label>
              <span class="label-title">Timeout ms <span class="optional-mark">(Optional)</span></span>
              <input name="timeout_ms" type="number" min="100" max="600000" placeholder="Default: 5000" />
            </label>
            <label data-mode-scope="trigger-timeout">
              <span class="label-title">Trigger timeout ms <span class="optional-mark">(Optional)</span></span>
              <input name="trigger_timeout_ms" type="number" min="500" max="600000" placeholder="Default: 10000" />
            </label>
            <label data-mode-scope="simple">
              <span class="label-title">Max samples <span class="optional-mark">(Optional)</span></span>
              <input name="max_samples" type="number" min="1" max="1000000" placeholder="Default: Unlimited" />
            </label>
            </div>
          </form>

          <section class="panel collapsible-panel" data-panel="measurement-options">
            <div class="panel-header">
              <div>
                <h2>Measurement options</h2>
                <p class="panel-summary" data-summary-for="measurement-options">Auto range, auto zero</p>
              </div>
              <button class="panel-toggle" type="button" aria-expanded="true">Hide</button>
            </div>
            <div class="panel-body">
              <div class="switch-row">
                <label><input name="auto_range" form="run-form" type="checkbox" checked /> Auto range</label>
                <label id="auto-zero-container">
                  <input name="auto_zero" form="run-form" type="checkbox" checked />
                  Auto zero
                </label>
              </div>
              <div class="single-field" id="range-container">
                <label>
                  <span class="field-title">
                    Range
                    <span id="range-unit" class="unit-chip">A</span>
                  </span>
                  <div class="input-with-unit">
                    <select
                      id="measurement-range"
                      name="measurement_range"
                      form="run-form"
                    ></select>
                    <span id="range-suffix">A</span>
                  </div>
                </label>
              </div>
            <label id="nplc-field">
              NPLC
              <select id="nplc" name="nplc" form="run-form"></select>
            </label>
            <label data-measurement-scope="voltage-dc">
              DCV input Z
              <select name="dcv_input_impedance" form="run-form">
                <option value="default">Default</option>
                <option value="10m">10M</option>
                <option value="auto">Auto</option>
              </select>
            </label>
              <label>
                VM Comp slope
                <select name="vm_comp_slope" form="run-form">
                  <option value="">Leave unchanged</option>
                  <option value="pos">Pos</option>
                  <option value="neg">Neg</option>
                </select>
              </label>
            </div>
          </section>

          <section id="trigger-options-panel" class="panel collapsible-panel" data-panel="trigger-options">
            <div class="panel-header">
              <div>
                <h2>Trigger options</h2>
                <p class="panel-summary" data-summary-for="trigger-options">Software trigger ready</p>
              </div>
              <button class="panel-toggle" type="button" aria-expanded="true">Hide</button>
            </div>
            <div class="panel-body">
              <div class="switch-row" data-mode-scope="software">
                <label>
                  <input id="timer-trigger-checkbox" type="checkbox" />
                  Timer trigger
               </label>
              </div>
            <label data-mode-scope="custom">
              Trigger count
              <input name="trigger_count" form="run-form" type="number" min="1" max="1000000" />
            </label>
            <label data-mode-scope="custom">
              Sample count
              <input name="sample_count" form="run-form" type="number" min="1" max="1000000" />
            </label>
            <label data-mode-scope="custom">
              <span class="label-title">Buffer drain size <span class="optional-mark">(Optional)</span></span>
              <input name="buffer_drain_size" form="run-form" type="number" min="1" max="10000" placeholder="Default: No limit" />
            </label>
            <label data-mode-scope="hardware">
              <span class="label-title">HW delay s <span class="optional-mark">(Optional)</span></span>
              <input name="hw_trigger_delay_s" form="run-form" type="number" min="0" max="3600" step="0.001" placeholder="Default: 0" />
            </label>
            <label data-mode-scope="hardware">
              HW slope
              <select name="hw_trigger_slope" form="run-form">
                <option value="neg">Neg</option>
                <option value="pos">Pos</option>
              </select>
            </label>
            <label id="sw-min-interval-container" data-mode-scope="software-trigger">
              <span class="label-title">SW min interval ms <span class="optional-mark">(Optional)</span></span>
              <input name="sw_min_interval_ms" form="run-form" type="number" min="0" max="600000" placeholder="Default: 0 (Disabled)" />
            </label>
            <label id="sw-queue-max-container" data-mode-scope="software-trigger">
              <span class="label-title">SW queue max <span class="optional-mark">(Optional)</span></span>
              <input name="sw_queue_max" form="run-form" type="number" min="0" max="10000" placeholder="Default: 0 (Disabled)" />
            </label>
            <label id="timer-interval-container" data-mode-scope="software" class="is-hidden">
              Timer interval s
              <input name="timer_interval_s" form="run-form" type="number" min="0.5" max="86400" step="0.001" disabled />
            </label>
              <div class="switch-row" data-mode-scope="custom">
                <label><input name="allow_buffer_overflow_risk" form="run-form" type="checkbox" /> Allow buffer risk</label>
              </div>
              <label id="trigger-metadata-container" data-mode-scope="software-trigger">
                <span class="label-title">Trigger metadata JSON <span class="optional-mark">(Optional)</span></span>
                <textarea id="trigger-metadata" rows="3" placeholder="{&quot;batch&quot;:&quot;A1&quot;}"></textarea>
              </label>
            </div>
          </section>
        </div>

        <section class="panel live-data-panel">
          <h2>Live data</h2>
          <div class="live-data-placeholder">Live data view is not implemented yet.</div>
        </section>

        <section class="panel log-panel">
          <div class="status-panel-header">
            <h2>Status</h2>
            <button
              id="toggle-status-details"
              type="button"
              aria-controls="status-details"
              aria-expanded="false"
            >
              Show Details
            </button>
          </div>
          <div
            id="latest-status"
            class="status-log"
            role="log"
            aria-live="polite"
            aria-label="Status log"
          ></div>
          <div id="status-details" class="status-details is-hidden">
            <pre id="fatal-error"></pre>
            <pre id="cleanup-status"></pre>
            <pre id="raw-status"></pre>
          </div>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
